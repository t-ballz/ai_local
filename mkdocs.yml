site_name: AI Local — Personal Knowledge Base
site_description: Notes on running AI locally
docs_dir: docs
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Hardware:
    - Overview: hardware/index.md
    - Ryzen 7 9700X + RTX 5060: hardware/ryzen7-9700x-rtx5060.md
    - i5-4570 + GTX 1050 Ti: hardware/i5-4570-1050ti.md
  - Models:
    - Overview: models/index.md
    - Llama: models/llama.md
    - Qwen: models/qwen.md
    - DeepSeek: models/deepseek.md
    - Gemma: models/gemma.md
  - Inference:
    - Overview: inference/index.md
    - Ollama: inference/ollama.md
    - llama.cpp: inference/llama-cpp.md
    - LM Studio: inference/lm-studio.md
  - Tools:
    - Overview: tools/index.md
    - UI Tools:
      - Overview: tools/ui/index.md
      - Open WebUI: tools/ui/openwebui.md
      - AnythingLLM: tools/ui/anythingllm.md
    - CLI Tools:
      - Overview: tools/cli/index.md
      - Claude Code Alternatives: tools/cli/claude-code-alternatives.md
