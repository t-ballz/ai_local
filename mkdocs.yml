site_name: AI Local — Personal Knowledge Base
site_description: Notes on running AI locally
docs_dir: docs
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Hardware:
    - Overview: hardware/index.md
    - Ryzen 7 9700X + RTX 5060: hardware/ryzen7-9700x-rtx5060.md
    - i5-4570 + GTX 1050 Ti: hardware/i5-4570-1050ti.md
  - Models:
    - Overview: models/index.md
    - How LLMs Work: models/how-llms-work.md
    - Llama: models/llama.md
    - Qwen: models/qwen.md
    - DeepSeek: models/deepseek.md
    - Gemma: models/gemma.md
    - Mistral: models/mistral.md
    - SmolLM3: models/smollm.md
    - LFM: models/lfm.md
    - Kimi K2: models/kimi.md
    - Holo: models/holo.md
    - Mellum: models/mellum.md
    - Nemotron: models/nemotron.md
    - North Mini Code: models/north-mini-code.md
    - Specialized:
      - Miso One (TTS): models/miso.md
      - LocateAnything-3B: models/locate-anything.md
      - Ideogram 4.0: models/ideogram.md
      - Harness-1 (Search Agent): models/harness.md
      - FastContext (Code Explorer): models/fastcontext.md
  - Inference:
    - Overview: inference/index.md
    - Ollama: inference/ollama.md
    - llama.cpp: inference/llama-cpp.md
    - LM Studio: inference/lm-studio.md
    - TurboQuant (KV Cache): inference/turboquant.md
  - Tips:
    - Overview: tips/index.md
    - Agentic AI Engineer Roadmap: tips/agentic-ai-engineer-roadmap.md
  - Research:
